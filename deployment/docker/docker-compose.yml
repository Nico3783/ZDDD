version: "3.8"

services:
  detection-engine:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: dos-detection-engine
    ports:
      - "8501:8501"
    volumes:
      - ../../config:/app/config
      - ../../models:/app/models
      - ../../data:/app/data
      - ../../logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import src; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
