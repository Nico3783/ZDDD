<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="9" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0.5 L9,3 L0,5.5 Z" fill="#94a3b8"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="9" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0.5 L9,3 L0,5.5 Z" fill="#dc2626"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="9" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0.5 L9,3 L0,5.5 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b" letter-spacing="1">SYSTEM ARCHITECTURE</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">Real-Time Autonomous Zero-Day DoS Detection Engine</text>

  <!-- ══════════ ROW 1: BATCH TRAINING ══════════ -->
  <text x="50" y="110" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.5">BATCH TRAINING</text>

  <!-- CICIDS2017 -->
  <rect x="50" y="130" width="160" height="70" rx="8" fill="#3b82f6" filter="url(#sh)"/>
  <text x="130" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">CICIDS2017</text>
  <text x="130" y="178" text-anchor="middle" font-size="10.5" fill="#bfdbfe">~693K flows · 84 features</text>

  <line x1="215" y1="165" x2="260" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Preprocessing -->
  <rect x="265" y="130" width="160" height="70" rx="8" fill="#22c55e" filter="url(#sh)"/>
  <text x="345" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Preprocessing</text>
  <text x="345" y="176" text-anchor="middle" font-size="10.5" fill="#dcfce7">Clean · Encode · Scale</text>
  <text x="345" y="190" text-anchor="middle" font-size="10.5" fill="#dcfce7">Feature Selection → 30</text>

  <line x1="430" y1="165" x2="475" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Split -->
  <rect x="480" y="143" width="80" height="44" rx="6" fill="#60a5fa" filter="url(#sh)"/>
  <text x="520" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">80/20 Split</text>

  <!-- Branch to IF -->
  <path d="M560,152 L590,125 L640,125" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="575" y="130" font-size="9" fill="#64748b" font-weight="600">Train</text>

  <!-- Branch to RF -->
  <path d="M560,178 L590,205 L640,205" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="575" y="200" font-size="9" fill="#64748b" font-weight="600">Test</text>

  <!-- Isolation Forest -->
  <rect x="645" y="100" width="170" height="60" rx="8" fill="#8b5cf6" filter="url(#sh)"/>
  <text x="730" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Isolation Forest</text>
  <text x="730" y="143" text-anchor="middle" font-size="10.5" fill="#ede9fe">Anomaly Detection</text>
  <text x="730" y="156" text-anchor="middle" font-size="9.5" fill="#c4b5fd">200 trees · contam.=0.1</text>

  <!-- Random Forest -->
  <rect x="645" y="180" width="170" height="60" rx="8" fill="#8b5cf6" filter="url(#sh)"/>
  <text x="730" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Random Forest</text>
  <text x="730" y="223" text-anchor="middle" font-size="10.5" fill="#ede9fe">Multi-class Classification</text>
  <text x="730" y="236" text-anchor="middle" font-size="9.5" fill="#c4b5fd">150 trees · depth=20</text>

  <!-- Arrows to Evaluation -->
  <path d="M820,130 L855,130 L855,165 L895,165" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M820,210 L855,210 L855,165 L895,165" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- Evaluation -->
  <rect x="900" y="115" width="160" height="100" rx="8" fill="#334155" filter="url(#sh)"/>
  <text x="980" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Evaluation</text>
  <line x1="920" y1="150" x2="1040" y2="150" stroke="#475569" stroke-width="0.6"/>
  <text x="980" y="166" text-anchor="middle" font-size="10.5" fill="#cbd5e1">Accuracy · F1 · ROC-AUC</text>
  <text x="980" y="182" text-anchor="middle" font-size="10.5" fill="#cbd5e1">Confusion Matrix</text>
  <text x="980" y="198" text-anchor="middle" font-size="10.5" fill="#cbd5e1">Latency · Throughput</text>

  <!-- Arrow to Reports -->
  <line x1="1065" y1="165" x2="1100" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Reports -->
  <rect x="1105" y="140" width="80" height="50" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" filter="url(#sh)"/>
  <text x="1145" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Reports</text>
  <text x="1145" y="178" text-anchor="middle" font-size="9.5" fill="#64748b">JSON · ROC</text>

  <!-- Model artifact label -->
  <rect x="685" y="248" width="130" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="750" y="263" text-anchor="middle" font-size="9.5" fill="#64748b">models/trained/*.pkl</text>

  <!-- ══════════ DASHED: models loaded at runtime ══════════ -->
  <path d="M750,272 L750,340 L350,340 L350,368" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="6,4" fill="none" marker-end="url(#a)"/>
  <text x="540" y="336" text-anchor="middle" font-size="10" fill="#8b5cf6" font-style="italic">Trained models loaded at runtime</text>

  <!-- ══════════ ROW 2: REAL-TIME DETECTION ══════════ -->
  <text x="50" y="390" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.5">REAL-TIME DETECTION</text>

  <!-- Live Traffic -->
  <rect x="50" y="405" width="160" height="70" rx="8" fill="#3b82f6" filter="url(#sh)"/>
  <text x="130" y="435" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Live Traffic</text>
  <text x="130" y="453" text-anchor="middle" font-size="10.5" fill="#bfdbfe">StreamSimulator</text>
  <text x="130" y="467" text-anchor="middle" font-size="10.5" fill="#bfdbfe">Row-by-row · 100x replay</text>

  <line x1="215" y1="440" x2="260" y2="440" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MicroBatch -->
  <rect x="265" y="410" width="140" height="60" rx="8" fill="#22c55e" filter="url(#sh)"/>
  <text x="335" y="437" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">MicroBatch</text>
  <text x="335" y="455" text-anchor="middle" font-size="10.5" fill="#dcfce7">32-sample batches</text>

  <line x1="410" y1="440" x2="460" y2="440" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- DetectionEngine -->
  <rect x="465" y="400" width="200" height="80" rx="8" fill="#dc2626" filter="url(#sh)"/>
  <text x="565" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">DetectionEngine</text>
  <line x1="485" y1="437" x2="645" y2="437" stroke="#fca5a5" stroke-width="0.6"/>
  <text x="565" y="453" text-anchor="middle" font-size="10.5" fill="#fecaca">IF anomaly → RF classify</text>
  <text x="565" y="469" text-anchor="middle" font-size="10.5" fill="#fecaca">Severity · Zero-day boost</text>

  <line x1="670" y1="440" x2="720" y2="440" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- AlertManager -->
  <rect x="725" y="408" width="160" height="64" rx="8" fill="#f97316" filter="url(#sh)"/>
  <text x="805" y="435" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">AlertManager</text>
  <text x="805" y="453" text-anchor="middle" font-size="10.5" fill="#fff7ed">Generate · Route · Throttle</text>
  <text x="805" y="466" text-anchor="middle" font-size="9.5" fill="#fed7aa">60 alerts/min cap</text>

  <!-- Arrow to Dashboard -->
  <line x1="890" y1="440" x2="940" y2="440" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Streamlit Dashboard -->
  <rect x="945" y="400" width="190" height="80" rx="8" fill="#16a34a" filter="url(#sh)"/>
  <text x="1040" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Streamlit Dashboard</text>
  <text x="1040" y="446" text-anchor="middle" font-size="10.5" fill="#dcfce7">ZION-TECH · Real-time UI</text>
  <line x1="965" y1="453" x2="1115" y2="453" stroke="#86efac" stroke-width="0.6"/>
  <text x="1040" y="468" text-anchor="middle" font-size="10.5" fill="#dcfce7">Overview · Alerts · Metrics</text>
  <text x="1040" y="482" text-anchor="middle" font-size="10.5" fill="#dcfce7">Models · Live monitoring</text>

  <!-- Output labels -->
  <rect x="745" y="485" width="65" height="22" rx="4" fill="#fecaca" filter="url(#sh)"/>
  <text x="778" y="500" text-anchor="middle" font-size="9.5" font-weight="600" fill="#991b1b">alerts.json</text>
  <rect x="825" y="485" width="60" height="22" rx="4" fill="#fecaca" filter="url(#sh)"/>
  <text x="855" y="500" text-anchor="middle" font-size="9.5" font-weight="600" fill="#991b1b">alerts.csv</text>

  <!-- ══════════ LEGEND ══════════ -->
  <rect x="50" y="535" width="1085" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>

  <text x="70" y="557" font-size="9.5" font-weight="700" fill="#334155" letter-spacing="0.5">LEGEND</text>

  <rect x="130" y="550" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="148" y="560" font-size="10" fill="#475569">Data Source</text>

  <rect x="230" y="550" width="12" height="12" rx="2" fill="#22c55e"/>
  <text x="248" y="560" font-size="10" fill="#475569">Preprocessing</text>

  <rect x="345" y="550" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="363" y="560" font-size="10" fill="#475569">ML Model</text>

  <rect x="440" y="550" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="458" y="560" font-size="10" fill="#475569">Detection</text>

  <rect x="530" y="550" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="548" y="560" font-size="10" fill="#475569">Alerts</text>

  <rect x="605" y="550" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="623" y="560" font-size="10" fill="#475569">Output</text>

  <rect x="680" y="550" width="12" height="12" rx="2" fill="#334155"/>
  <text x="698" y="560" font-size="10" fill="#475569">Evaluation</text>

  <line x1="780" y1="556" x2="810" y2="556" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="820" y="560" font-size="10" fill="#475569">Data flow</text>

  <line x1="890" y1="556" x2="920" y2="556" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#a)"/>
  <text x="930" y="560" font-size="10" fill="#475569">Model load</text>

  <!-- ══════════ KEY METRICS ══════════ -->
  <rect x="50" y="580" width="1085" height="28" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="70" y="599" font-size="9.5" font-weight="700" fill="#334155" letter-spacing="0.5">KEY METRICS</text>
  <text x="180" y="599" font-size="10" fill="#475569">Accuracy 95.8%</text>
  <text x="310" y="599" font-size="10" fill="#475569">F1-Score 93.4%</text>
  <text x="440" y="599" font-size="10" fill="#475569">Zero-day Recall 81.1%</text>
  <text x="600" y="599" font-size="10" fill="#475569">Latency 42ms</text>
  <text x="720" y="599" font-size="10" fill="#475569">Throughput 1,247 flows/s</text>
  <text x="900" y="599" font-size="10" fill="#475569">FPR &lt;5%</text>
</svg>