<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e" letter-spacing="0.3">System Architecture</text>
  <text x="600" y="64" text-anchor="middle" font-size="10.5" fill="#94a3b8">Real-Time Zero-Day DoS Detection Engine</text>
  <line x1="480" y1="78" x2="720" y2="78" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- LAYER 1: DATA SOURCE -->
  <!-- ════════════════════════════════════════════════════════ -->

  <text x="600" y="108" text-anchor="middle" font-size="8" font-weight="600" fill="#94a3b8" letter-spacing="1.5">DATA SOURCE</text>

  <rect x="430" y="118" width="340" height="56" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="600" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">CICIDS2017</text>
  <text x="600" y="160" text-anchor="middle" font-size="9" fill="#6366f1">Wednesday-workingHours · 693K flows · 84 features</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- LAYER 2: PREPROCESSING -->
  <!-- ════════════════════════════════════════════════════════ -->

  <text x="600" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#94a3b8" letter-spacing="1.5">PREPROCESSING</text>

  <!-- 4 preprocessing blocks in a row -->
  <rect x="130" y="222" width="170" height="52" rx="7" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="215" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Clean</text>
  <text x="215" y="260" text-anchor="middle" font-size="8" fill="#22c55e">Dedup · Inf · Null</text>

  <rect x="320" y="222" width="170" height="52" rx="7" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="405" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Encode</text>
  <text x="405" y="260" text-anchor="middle" font-size="8" fill="#22c55e">Label Encoding</text>

  <rect x="510" y="222" width="170" height="52" rx="7" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="595" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Scale</text>
  <text x="595" y="260" text-anchor="middle" font-size="8" fill="#22c55e">StandardScaler</text>

  <rect x="700" y="222" width="170" height="52" rx="7" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="785" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Select</text>
  <text x="785" y="260" text-anchor="middle" font-size="8" fill="#22c55e">30 of 84 features</text>

  <!-- Feature count callout -->
  <rect x="900" y="230" width="170" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="985" y="252" text-anchor="middle" font-size="9" fill="#64748b">84 → 30 features (64% reduction)</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- LAYER 3: MACHINE LEARNING CORE -->
  <!-- ════════════════════════════════════════════════════════ -->

  <text x="600" y="312" text-anchor="middle" font-size="8" font-weight="600" fill="#94a3b8" letter-spacing="1.5">MACHINE LEARNING CORE</text>

  <!-- Isolation Forest -->
  <rect x="130" y="322" width="310" height="80" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="285" y="349" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Isolation Forest</text>
  <text x="285" y="366" text-anchor="middle" font-size="9" fill="#8b5cf6">Anomaly Detection · Unsupervised</text>
  <line x1="160" y1="376" x2="410" y2="376" stroke="#ede9fe" stroke-width="0.6"/>
  <text x="285" y="391" text-anchor="middle" font-size="8" fill="#a78bfa">200 estimators · contamination 0.1 · threshold 95th pctl</text>

  <!-- Random Forest -->
  <rect x="470" y="322" width="310" height="80" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="625" y="349" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Random Forest</text>
  <text x="625" y="366" text-anchor="middle" font-size="9" fill="#8b5cf6">Multi-class Classification · Supervised</text>
  <line x1="500" y1="376" x2="750" y2="376" stroke="#ede9fe" stroke-width="0.6"/>
  <text x="625" y="391" text-anchor="middle" font-size="8" fill="#a78bfa">150 estimators · depth 20 · balanced · Gini</text>

  <!-- Detection Engine -->
  <rect x="810" y="322" width="260" height="80" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="940" y="349" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">Detection Engine</text>
  <text x="940" y="366" text-anchor="middle" font-size="9" fill="#ef4444">Two-Stage Pipeline</text>
  <line x1="835" y1="376" x2="1045" y2="376" stroke="#fee2e2" stroke-width="0.6"/>
  <text x="940" y="391" text-anchor="middle" font-size="8" fill="#f87171">IF anomaly → RF classify → severity → zero-day flag</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- LAYER 4: STREAMING & ALERTING -->
  <!-- ════════════════════════════════════════════════════════ -->

  <text x="600" y="436" text-anchor="middle" font-size="8" font-weight="600" fill="#94a3b8" letter-spacing="1.5">STREAMING &amp; ALERTING</text>

  <rect x="200" y="446" width="200" height="52" rx="7" fill="#fff7ed" stroke="#fed7aa" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="300" y="469" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Stream Simulator</text>
  <text x="300" y="484" text-anchor="middle" font-size="8" fill="#ea580c">Row-by-row replay · 100x rate</text>

  <rect x="430" y="446" width="200" height="52" rx="7" fill="#fff7ed" stroke="#fed7aa" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="530" y="469" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Micro-Batch</text>
  <text x="530" y="484" text-anchor="middle" font-size="8" fill="#ea580c">32 samples · 100ms timeout</text>

  <rect x="660" y="446" width="200" height="52" rx="7" fill="#fff7ed" stroke="#fed7aa" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="760" y="469" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Alert Manager</text>
  <text x="760" y="484" text-anchor="middle" font-size="8" fill="#ea580c">JSONL + CSV · 60 alerts/min cap</text>

  <!-- Severity levels -->
  <rect x="890" y="446" width="170" height="52" rx="7" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="975" y="466" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">Severity</text>
  <text x="915" y="482" font-size="7.5" fill="#dc2626">■</text>
  <text x="925" y="482" font-size="7.5" fill="#64748b">Critical ≥0.9</text>
  <text x="915" y="493" font-size="7.5" fill="#ea580c">■</text>
  <text x="925" y="493" font-size="7.5" fill="#64748b">High ≥0.7 · Med ≥0.5</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- LAYER 5: OUTPUT & MONITORING -->
  <!-- ════════════════════════════════════════════════════════ -->

  <text x="600" y="530" text-anchor="middle" font-size="8" font-weight="600" fill="#94a3b8" letter-spacing="1.5">OUTPUT &amp; MONITORING</text>

  <rect x="230" y="540" width="220" height="56" rx="7" fill="#f0f9ff" stroke="#bae6fd" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="340" y="564" text-anchor="middle" font-size="12" font-weight="600" fill="#0369a1">Streamlit Dashboard</text>
  <text x="340" y="580" text-anchor="middle" font-size="8" fill="#0284c7">5 pages · Real-time · Tactical HUD theme</text>

  <rect x="490" y="540" width="220" height="56" rx="7" fill="#f0f9ff" stroke="#bae6fd" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="600" y="564" text-anchor="middle" font-size="12" font-weight="600" fill="#0369a1">Evaluation Reports</text>
  <text x="600" y="580" text-anchor="middle" font-size="8" fill="#0284c7">Accuracy · F1 · ROC-AUC · Confusion Matrix</text>

  <rect x="750" y="540" width="220" height="56" rx="7" fill="#f0f9ff" stroke="#bae6fd" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="860" y="564" text-anchor="middle" font-size="12" font-weight="600" fill="#0369a1">Alert Logs</text>
  <text x="860" y="580" text-anchor="middle" font-size="8" fill="#0284c7">JSONL + CSV · Date-rotated</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- KEY METRICS BAR -->
  <!-- ════════════════════════════════════════════════════════ -->

  <rect x="100" y="620" width="1000" height="44" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="140" y="646" font-size="9" font-weight="600" fill="#475569" letter-spacing="0.5">KEY RESULTS</text>

  <line x1="235" y1="628" x2="235" y2="656" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="280" y="643" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">95.8%</text>
  <text x="280" y="654" text-anchor="middle" font-size="7.5" fill="#64748b">Accuracy</text>

  <line x1="345" y1="628" x2="345" y2="656" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="395" y="643" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed">93.4%</text>
  <text x="395" y="654" text-anchor="middle" font-size="7.5" fill="#64748b">Macro F1</text>

  <line x1="455" y1="628" x2="455" y2="656" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="510" y="643" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">81.1%</text>
  <text x="510" y="654" text-anchor="middle" font-size="7.5" fill="#64748b">Zero-day Recall</text>

  <line x1="575" y1="628" x2="575" y2="656" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="625" y="643" text-anchor="middle" font-size="10" font-weight="700" fill="#c2410c">42ms</text>
  <text x="625" y="654" text-anchor="middle" font-size="7.5" fill="#64748b">Latency</text>

  <line x1="680" y1="628" x2="680" y2="656" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="740" y="643" text-anchor="middle" font-size="10" font-weight="700" fill="#0369a1">1,247</text>
  <text x="740" y="654" text-anchor="middle" font-size="7.5" fill="#64748b">flows/s</text>

  <line x1="800" y1="628" x2="800" y2="656" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="850" y="643" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">4.1%</text>
  <text x="850" y="654" text-anchor="middle" font-size="7.5" fill="#64748b">FPR</text>

  <line x1="905" y1="628" x2="905" y2="656" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="960" y="643" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed">0.953</text>
  <text x="960" y="654" text-anchor="middle" font-size="7.5" fill="#64748b">ROC-AUC</text>

</svg>