version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  simple:
    format: "%(asctime)s | %(levelname)-8s | %(message)s"
    datefmt: "%H:%M:%S"
  json:
    class: "pythonjsonlogger.jsonlogger.JsonFormatter"
    format: "timestamp level name function message"

handlers:
  console:
    class: "logging.StreamHandler"
    level: "INFO"
    formatter: "standard"
    stream: "ext://sys.stdout"
  app_file:
    class: "logging.handlers.RotatingFileHandler"
    level: "DEBUG"
    formatter: "standard"
    filename: "logs/app.log"
    maxBytes: 10485760
    backupCount: 5
    encoding: "utf-8"
  error_file:
    class: "logging.handlers.RotatingFileHandler"
    level: "WARNING"
    formatter: "standard"
    filename: "logs/errors.log"
    maxBytes: 10485760
    backupCount: 3
    encoding: "utf-8"
  alerts_file:
    class: "logging.handlers.RotatingFileHandler"
    level: "INFO"
    formatter: "json"
    filename: "logs/alerts.log"
    maxBytes: 20971520
    backupCount: 3
    encoding: "utf-8"
  streaming_file:
    class: "logging.handlers.RotatingFileHandler"
    level: "INFO"
    formatter: "standard"
    filename: "logs/streaming.log"
    maxBytes: 20971520
    backupCount: 3
    encoding: "utf-8"

loggers:
  src:
    level: "DEBUG"
    handlers: ["console", "app_file", "error_file"]
    propagate: false
  src.alerting:
    level: "INFO"
    handlers: ["console", "alerts_file"]
    propagate: false
  src.streaming:
    level: "INFO"
    handlers: ["console", "streaming_file"]
    propagate: false
  src.evaluation:
    level: "INFO"
    handlers: ["console", "app_file"]
    propagate: false

root:
  level: "WARNING"
  handlers: ["console"]
