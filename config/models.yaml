isolation_forest:
  n_estimators: 200
  max_samples: "auto"
  contamination: 0.1
  max_features: 1.0
  bootstrap: false
  n_jobs: -1
  random_state: 42
  warm_start: false
  threshold_percentile: 95.0

random_forest:
  n_estimators: 150
  max_depth: 20
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: "sqrt"
  bootstrap: true
  oob_score: true
  n_jobs: -1
  random_state: 42
  class_weight: "balanced"
  criterion: "gini"
  warm_start: false

hyperparameter_tuning:
  enabled: true
  method: "grid"
  cv_folds: 5
  scoring: "f1_weighted"
  n_iter: 50
  random_forest_params:
    n_estimators: [100, 150, 200]
    max_depth: [15, 20, 25, null]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]

model_persistence:
  compress: true
  protocol: 3
  metadata_version: 1

threshold_optimization:
  metric: "f1"
  step: 0.001
  min_threshold: 0.0
  max_threshold: 1.0

training:
  split_random_state: 42
  shuffle: true
  val_size: 0.1
  test_size: 0.2
