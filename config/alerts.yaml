severity:
  critical:
    label: "CRITICAL"
    level: 4
    color: "#FF0000"
    requires_acknowledgment: true
    ttl_seconds: 3600
  high:
    label: "HIGH"
    level: 3
    color: "#FF6600"
    requires_acknowledgment: false
    ttl_seconds: 1800
  medium:
    label: "MEDIUM"
    level: 2
    color: "#FFD700"
    requires_acknowledgment: false
    ttl_seconds: 900
  low:
    label: "LOW"
    level: 1
    color: "#00BFFF"
    requires_acknowledgment: false
    ttl_seconds: 300

output:
  format: "json"
  log_to_file: true
  log_to_console: false
  archive_enabled: true
  archive_interval_days: 7

alert_fields:
  - "timestamp"
  - "severity"
  - "anomaly_score"
  - "predicted_class"
  - "confidence"
  - "is_zero_day"
  - "features_snapshot"
  - "batch_id"
  - "latency_ms"

suppression:
  enabled: true
  dedup_window_seconds: 60
  max_repeats: 5
  reset_after_seconds: 300
